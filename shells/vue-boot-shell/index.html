<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make RPG Code from Template</title>

  <!-- Bootstrap 5 CSS (latest as of 2026) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
    crossorigin="anonymous">

  <!-- Optional: Bootstrap Icons if you want to use them -->
  <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="app">

<home-navbar></home-navbar>

<div class="container mt-3">
  
  <div class="flex-row">
    <h1>ibm i code maker</h1>
    <code-links :env-dir="envDir"></code-links>
  </div>

  <div class="flex-row mt-3">
    <!-- vue drop down select -->
    <div class="flex-column" >
    <div >
      <label for="templateSelect" class="form-label">Select RPG Template:</label>
      <select id="templateSelect" class="form-select" v-model="selectedTemplate">
        <option v-for="item in templates" :value="item">
          {{ item }}
        </option>
      </select>
    </div>
    
    <button class="btn btn-primary" 
    @click="templateExecuteControl = {fileName:selectedTemplate}">Execute Template</button>
    </div>

    <div v-if="selectedTemplate">
      <label for="templateTextArea" class="form-label">Template Content:</label>
      <textarea id="templateTextArea" class="form-controlx xmonospace-textarea srcmbr-textarea" 
        rows="20" cols="80" v-model="templateText"></textarea>
    </div>
  </div>
</div>

<template-execute v-if="templateExecuteControl" :file-name="templateExecuteControl.fileName"
  @template-execute-executed="viewRunOutput($event.runnum);"
  @template-execute-close="templateExecuteControl = undefined;">
</template-execute>

  <!-- Bootstrap JS Bundle (includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

    
    <script type="module" src="./app.mjs"></script>
    <script type="module">
      import { app } from './app.mjs';
      app.mount('#app');
    </script>
      <script type="module" src="../components/code-links.mjs"></script>


</body>

</html>
